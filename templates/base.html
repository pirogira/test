<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ settings.page_title if settings else "Тестовая верстка" }}{% endblock %}</title>
    <meta name="description" content="{{ settings.meta_description if settings else 'Адаптивная страница с управлением контентом.' }}">
    {% block styles %}{% endblock %}
</head>
<body>
{% block content %}{% endblock %}
{% block scripts %}{% endblock %}
</body>
</html>
